<h1>食材期限メモ</h1>
<p>食材期限メモは、食材の賞味期限や消費期限を簡単に記録・管理できるアプリです。</p>
<p>冷蔵庫の食材を登録することで、期限が近いものを一覧で確認できます。通知機能により、期限切れを防ぎ、フードロスの削減にも役立ちます。</p>
<h2>主な機能</h2>
<ul>
<li>食材の賞味期限・消費期限の記録</li>
<li>期限が近い食材の一覧表示</li>
<li>期限前の通知機能</li>
<li>シンプルで使いやすい操作</li>
</ul>
<p>日々の食材管理を、もっと簡単に。</p>
