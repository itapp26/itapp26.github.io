<h1>プライバシーポリシー</h1>
<p>このページはサンプルアプリ（仮）のプライバシーポリシーのテンプレートです。アプリで取り扱う情報や利用目的などを記載してください。</p>
<p>例として、以下の内容を含めると良いでしょう：</p>
<ul>
<li>取得する情報の種類（ユーザー入力、位置情報、広告ID など）</li>
<li>情報の利用目的</li>
<li>第三者提供の有無</li>
<li>ユーザーによる問い合わせ方法</li>
</ul>
