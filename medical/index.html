<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>通院メモ</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #5f6b7a;
      --line: #d9e2ec;
      --accent: #2563eb;
      --accent-soft: #e8f0ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Segoe UI", sans-serif;
      line-height: 1.75;
    }

    .page {
      width: min(920px, 100%);
      margin: 0 auto;
      padding: 24px 18px 40px;
    }

    header {
      padding: 36px 0 24px;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 700;
    }

    h1 {
      margin: 14px 0 10px;
      font-size: clamp(2rem, 8vw, 3.4rem);
      line-height: 1.15;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 1.3rem;
    }

    p {
      margin: 0 0 14px;
    }

    .lead {
      max-width: 680px;
      color: var(--muted);
      font-size: 1.06rem;
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      margin-top: 22px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .button-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 16px;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
    }

    .button-link.secondary {
      background: var(--card);
      color: var(--accent);
      border: 1px solid var(--line);
    }

    footer {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <span class="badge">ローカル記録アプリ</span>
      <h1>通院メモ</h1>
      <p class="lead">
        通院メモは、家族ごとの通院日、病院名、診療科、支払額、お薬に関するメモ、診察前メモ、自由メモ、次回予定日を端末内に記録・整理するためのシンプルなアプリです。
      </p>
      <div class="links" aria-label="関連ページ">
        <a class="button-link" href="support.html">サポートページ</a>
        <a class="button-link secondary" href="privacy.html">プライバシーポリシー</a>
      </div>
    </header>

    <section class="grid" aria-label="概要">
      <div class="card">
        <h2>できること</h2>
        <p>
          家族ごとに通院記録を残し、あとから見返しやすい形で整理できます。初回公開時点では、広告、課金、アカウント登録、外部通信はありません。
        </p>
      </div>
      <div class="card">
        <h2>大切なこと</h2>
        <p>
          本アプリは、ユーザー自身が通院に関するメモを整理するためのものです。医療上の判断、薬の量や飲むタイミングの判断、税務上の判定は行いません。
        </p>
      </div>
    </section>

    <footer>
      <p>&copy; 2026 通院メモ</p>
    </footer>
  </main>
</body>
</html>
