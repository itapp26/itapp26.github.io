      <h1>BlockFit</h1>
      <p>
        BlockFitは、ブロックを盤面に配置し、縦または横の列をそろえて消していくiPhone / iPad向けパズルゲームです。
      </p>
      <p>
        シンプルな操作で遊べる一方、どこにブロックを置くかを考える戦略性も楽しめます。短時間でも遊びやすく、スコア更新を目指して繰り返し楽しめます。
      </p>

      <h2>主な特徴</h2>
      <ul>
        <li>ブロックを置いて、そろえて消すシンプルなルール</li>
        <li>直感的な操作で、すぐに遊べる</li>
        <li>縦または横の列をそろえる爽快感</li>
        <li>置き方を考えるパズル性</li>
